<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>YOM Sales · Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --yom-primary: #613BC0;
      --yom-soft: #F9F7FF;
      --yom-green: #61CE70;
      --yom-peach: #FFBC7D;
    }
    html, body { height: 100%; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "tnum" 0;
    }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    /* subtle custom scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; border: 2px solid #F8FAFC; }
    ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

    .border-slate-150 { border-color: #ECEFF4; }
    button:focus-visible, [data-tab]:focus-visible, select:focus-visible {
      outline: 2px solid #613BC0;
      outline-offset: 2px;
      border-radius: 8px;
    }
  </style>
</head>
<body class="min-h-screen">
  
  <!-- Topbar -->
  <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="mx-auto flex items-center gap-6 px-5 lg:px-8 py-3" style="max-width: 1760px;">
      <!-- Logo -->
      <div class="flex items-center gap-3 pr-4 border-r border-slate-200 min-w-[220px]">
        <div class="h-9 w-9 rounded-lg flex items-center justify-center font-bold text-white text-[15px]" style="background: linear-gradient(135deg, #613BC0 0%, #7A56D6 100%);">Y</div>
        <div class="leading-tight">
          <div class="text-[14px] font-semibold text-slate-900">YOM Sales</div>
          <div class="text-[10px] text-slate-500 tracking-wider uppercase">Internal · Growth</div>
        </div>
      </div>

      <!-- Tabs -->
      <nav id="topbar-tabs" class="flex items-center gap-1"></nav>

      <!-- Right meta -->
      <div id="topbar-meta" class="ml-auto flex items-center gap-3"></div>
    </div>
  </header>

  <!-- Main layout: sidebar + content -->
  <div class="flex items-start">
    <aside id="sidebar" class="sticky top-[61px] self-start shrink-0 w-[240px] bg-white border-r border-slate-200 h-[calc(100vh-61px)]"></aside>
    <main id="main" class="flex-1 min-w-0"></main>
  </div>

  <script src="data.js"></script>
<script>
// ---- Adapter: reshape YOM_DATA generated by extract.js into the schema the dashboard expects ----
(function () {
  const OLD = window.YOM_DATA || (typeof YOM_DATA !== 'undefined' ? YOM_DATA : null);
  if (!OLD) return;

  const GROUPS = [
    { id: 'soprole',     name: 'Grupo Soprole',     domains: ['soprole.youorder.me', 'sonrie.youorder.me'] },
    { id: 'surtiventas', name: 'Grupo Surtiventas', domains: ['surtiventas.youorder.me', 'prisa.youorder.me', 'prisur.youorder.me'] },
  ];
  const domainToGroup = {};
  GROUPS.forEach(g => g.domains.forEach(d => { domainToGroup[d] = g.id; }));

  const COUNTRY = {
    'codelpa-peru.youorder.me': 'PE',
    'coexito.youorder.me': 'CO',
    'surtiventas.youorder.me': 'CO',
    'prisa.youorder.me': 'CO',
    'prisur.youorder.me': 'CO',
  };
  const inferCountry = (d, native) => COUNTRY[d] || (native === 'COP' ? 'CO' : 'CL');

  const fxRates = {
    USD: 1,
    CLP: (OLD.fxRates && OLD.fxRates.CLP_TO_USD) ? 1 / OLD.fxRates.CLP_TO_USD : 952,
    COP: (OLD.fxRates && OLD.fxRates.COP_TO_USD) ? 1 / OLD.fxRates.COP_TO_USD : 4167,
  };

  const clients = (OLD.clients || []).map(c => {
    const native = c.nativeCurrency || 'CLP';
    const group = domainToGroup[c.domain] || null;
    const country = inferCountry(c.domain, native);
    if (c.sinDatos) {
      return { id: c.domain, name: c.name, group, country, currency: native, status: 'nodata', mensual: [] };
    }
    const mensual = (c.mensual || []).map(m => ({
      month: m.year + '-' + String(m.month).padStart(2, '0'),
      ventas: m.ventaSinIVA,
      pedidos: m.ordenes,
      comercios: m.comerciosActivos,
      vendedores: m.vendedoresActivos,
      registradosVend: c.cuentasVendedor || 0,
      registradosCom: c.comerciosRegistrados || 0,
      ticket: m.ordenes > 0 ? m.ventaSinIVA / m.ordenes : 0,
    }));
    return {
      id: c.domain, name: c.name, group, country, currency: native,
      firstOrder: c.primeraOrden, lastOrder: c.ultimaOrden,
      status: 'active',
      mensual,
    };
  });

  const active = clients.filter(x => x.status !== 'nodata' && x.mensual.length);
  const gmv12m = active.reduce((s, c) => s + c.mensual.reduce((ss, m) => ss + m.ventas, 0), 0);
  const pedidos12m = active.reduce((s, c) => s + c.mensual.reduce((ss, m) => ss + m.pedidos, 0), 0);
  const comerciosActivos = active.reduce((s, c) => {
    const last = c.mensual[c.mensual.length - 1];
    return s + (last ? last.comercios : 0);
  }, 0);
  const comerciosRegistrados = active.reduce((s, c) => s + ((c.mensual[c.mensual.length - 1] || {}).registradosCom || 0), 0);

  window.YOM_DATA = {
    extractedAt: OLD.extractedAt,
    fxRates,
    clients,
    globals: {
      gmv12m, pedidos12m, comerciosActivos, comerciosRegistrados,
      clientesActivos: active.length,
      clientesTotal: clients.length,
    },
    groups: GROUPS.map(g => ({ id: g.id, name: g.name, members: g.domains })),
  };
})();
</script>
<script>
// YOM Sales Dashboard — app logic
(function () {
  "use strict";

  const DATA = window.YOM_DATA;
  const fmtMoney = (n, opts = {}) => {
    if (n == null || isNaN(n)) return "—";
    const cur = opts.currency || state.displayCurrency || "USD";
    const rate = (DATA.fxRates && DATA.fxRates[cur]) || 1;
    const val = n * rate;
    const abs = Math.abs(val);
    const sym = cur === "USD" ? "US$" : "$";
    if (opts.compact !== false) {
      if (abs >= 1e9) return sym + (val / 1e9).toFixed(1) + "B";
      if (abs >= 1e6) return sym + (val / 1e6).toFixed(1) + "M";
      if (abs >= 1e3) return sym + (val / 1e3).toFixed(0) + "K";
    }
    return sym + val.toLocaleString(cur === "USD" ? "en-US" : "es-CL", { maximumFractionDigits: 0 });
  };
  const fmtUSD = fmtMoney;
  const fmtNum = (n) => (n == null || isNaN(n) ? "—" : n.toLocaleString("es-CL"));
  const fmtPct = (n, digits = 1) => (n == null || isNaN(n) ? "—" : `${(n * 100).toFixed(digits)}%`);
  const monthShort = (ym) => {
    const [y, m] = ym.split("-").map(Number);
    const names = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
    return `${names[m - 1]} ${String(y).slice(2)}`;
  };

  // ---------- State ----------
  const state = {
    view: "overview", // overview | cliente | comparativa
    selectedClient: null, // id (domain)
    compareIds: [],
    rankingSort: "gmv", // gmv | mom
    hideNoData: true,
    displayCurrency: "USD",
    compareMetric: "ventas",
    clienteMetric: "ventas",
    cliPeriod: "todo",
    opsOpen: false,
    allColumns: false,
  };
  // Init compareIds to first 4 active clients (by domain)
  (function initCompare() {
    const active = DATA.clients.filter(c => c.status !== "nodata" && c.mensual && c.mensual.length);
    state.compareIds = active.slice(0, 4).map(c => c.id);
  })();

  // ---------- Derived helpers ----------
  function clientById(id) {
    return DATA.clients.find((c) => c.id === id);
  }
  function clientGmv12m(c) {
    if (!c.mensual || c.mensual.length === 0) return 0;
    return c.mensual.reduce((s, m) => s + m.ventas, 0);
  }
  function clientLastMonth(c) {
    if (!c.mensual || c.mensual.length === 0) return null;
    return c.mensual[c.mensual.length - 1];
  }
  function clientPrevMonth(c) {
    if (!c.mensual || c.mensual.length < 2) return null;
    return c.mensual[c.mensual.length - 2];
  }
  function clientMoM(c) {
    const last = clientLastMonth(c);
    const prev = clientPrevMonth(c);
    if (!last || !prev || prev.ventas === 0) return null;
    return (last.ventas - prev.ventas) / prev.ventas;
  }
  function isCurrentCalendarMonth(ym) {
    const ref = DATA.extractedAt ? new Date(DATA.extractedAt) : new Date();
    const refYM = ref.getFullYear() + "-" + String(ref.getMonth() + 1).padStart(2, "0");
    return ym === refYM;
  }
  function clientLastClosedMonth(c) {
    if (!c.mensual || c.mensual.length === 0) return null;
    const lastIdx = c.mensual.length - 1;
    const last = c.mensual[lastIdx];
    if (isCurrentCalendarMonth(last.month) && c.mensual.length >= 2) return c.mensual[lastIdx - 1];
    return last;
  }
  function clientPrevClosedMonth(c) {
    if (!c.mensual || c.mensual.length === 0) return null;
    const lastIdx = c.mensual.length - 1;
    const off = isCurrentCalendarMonth(c.mensual[lastIdx].month) ? 2 : 1;
    if (c.mensual.length <= off) return null;
    return c.mensual[lastIdx - off];
  }
  function clientMoMClosed(c) {
    const last = clientLastClosedMonth(c);
    const prev = clientPrevClosedMonth(c);
    if (!last || !prev || prev.ventas === 0) return null;
    return (last.ventas - prev.ventas) / prev.ventas;
  }
  function clientAvgActive(c, key) {
    if (!c.mensual || c.mensual.length === 0) return 0;
    const active = c.mensual.filter((m) => m.ventas > 0);
    if (active.length === 0) return 0;
    return active.reduce((s, m) => s + (m[key] || 0), 0) / active.length;
  }
  function applyPeriodFilter(months) {
    const p = state.cliPeriod;
    if (!p || p === "todo") return months;
    if (p === "2025") return months.filter((m) => m.month.startsWith("2025-"));
    if (p === "2026") return months.filter((m) => m.month.startsWith("2026-"));
    const mm = { ene: "01", feb: "02", mar: "03", abr: "04", may: "05", jun: "06", jul: "07", ago: "08", sep: "09", oct: "10", nov: "11", dic: "12" }[p];
    return mm ? months.filter((m) => m.month.endsWith("-" + mm)) : months;
  }
  function clientStatus(c) {
    if (c.status === "nodata") return "nodata";
    const mom = clientMoMClosed(c) != null ? clientMoMClosed(c) : clientMoM(c);
    if (mom == null) return "stable";
    if (mom <= -0.15) return "falling";
    if (mom >= 0.10) return "growing";
    return "stable";
  }

  // ---------- Sparkline renderer (SVG, no axes) ----------
  function sparkline(values, { w = 100, h = 24, stroke = "#613BC0", fill = "none" } = {}) {
    if (!values || values.length === 0) return "";
    const max = Math.max(...values, 1);
    const min = Math.min(...values, 0);
    const range = max - min || 1;
    const step = w / Math.max(values.length - 1, 1);
    const points = values
      .map((v, i) => {
        const x = i * step;
        const y = h - 2 - ((v - min) / range) * (h - 4);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      })
      .join(" ");
    const areaPoints = `0,${h} ${points} ${w},${h}`;
    const area =
      fill !== "none"
        ? `<polyline points="${areaPoints}" fill="${fill}" stroke="none" />`
        : "";
    return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="none" class="block">
      ${area}
      <polyline points="${points}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
    </svg>`;
  }

  // ---------- Router ----------
  function setView(v) {
    if (v === "cliente" && !state.selectedClient) return;
    state.view = v;
    render();
  }
  function selectClient(id) {
    const c = clientById(id);
    if (!c || c.status === "nodata") return;
    state.selectedClient = id;
    state.view = "cliente";
    render();
  }

  // ---------- Render root ----------
  function render() {
    document.getElementById("topbar-tabs").innerHTML = renderTabs();
    document.getElementById("topbar-meta").innerHTML = renderTopbarMeta();
    document.getElementById("sidebar").innerHTML = renderSidebar();
    const main = document.getElementById("main");
    if (state.view === "overview") main.innerHTML = renderOverview();
    else if (state.view === "cliente") main.innerHTML = renderCliente();
    else if (state.view === "comparativa") main.innerHTML = renderComparativa();
    afterRender();
    bind();
  }

  // ---------- Topbar ----------
  function renderTabs() {
    const tabs = [
      { id: "overview", label: "Overview", enabled: true },
      { id: "cliente", label: "Cliente", enabled: !!state.selectedClient },
      { id: "comparativa", label: "Comparativa", enabled: true },
    ];
    return tabs
      .map(
        (t) => `
      <button data-tab="${t.id}" ${t.enabled ? "" : "disabled"}
        class="px-4 py-2 rounded-full text-[13px] font-medium transition
          ${state.view === t.id
            ? "bg-[#613BC0] text-white"
            : t.enabled
            ? "text-slate-600 hover:text-[#613BC0] hover:bg-[#F9F7FF]"
            : "text-slate-300 cursor-not-allowed"}">
        ${t.label}${t.id === "cliente" && state.selectedClient ? ` · ${clientById(state.selectedClient).name}` : ""}
      </button>`
      )
      .join("");
  }

  function renderTopbarMeta() {
    const c = state.selectedClient ? clientById(state.selectedClient) : null;
    const nativeBadge = c && c.currency !== "USD"
      ? `<div class="flex items-center gap-1 rounded-full border border-slate-200 bg-white px-2 py-1 text-[11px] font-medium text-slate-600">
           <span>Moneda nativa:</span><span class="text-[#613BC0]">${c.currency}</span>
         </div>`
      : "";
    const pill = (cur) => {
      const active = state.displayCurrency === cur;
      return `<button data-currency="${cur}" class="px-2.5 py-1 rounded-full text-[11px] font-semibold transition ${active ? "bg-white text-[#613BC0] shadow-sm" : "text-slate-500 hover:text-slate-700"}">${cur}</button>`;
    };
    let tsText = "—";
    if (DATA.extractedAt) {
      const d = new Date(DATA.extractedAt);
      tsText = d.toLocaleDateString("es-CL", { day: "2-digit", month: "short" }) + " " +
               d.toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" });
    }
    let fxText = "";
    if (DATA.fxRates) {
      const clp = Math.round(DATA.fxRates.CLP || 0);
      const cop = Math.round(DATA.fxRates.COP || 0);
      fxText = `1 USD = $${clp.toLocaleString("es-CL")} CLP · $${cop.toLocaleString("es-CL")} COP`;
    }
    return `
      ${nativeBadge}
      <div class="flex items-center gap-1 rounded-full bg-slate-100 p-1">
        ${pill("USD")}${pill("CLP")}${pill("COP")}
      </div>
      <div class="hidden lg:flex flex-col items-end text-[11px] text-slate-500 leading-tight">
        <span>Actualizado <span class="text-slate-700 font-medium">${tsText}</span></span>
        <span class="tabular-nums">${fxText}</span>
      </div>
    `;
  }

  // ---------- Sidebar ----------
  function renderSidebar() {
    const groups = DATA.groups;
    const ungrouped = DATA.clients.filter((c) => !c.group);

    const renderClientCard = (c, indent = false) => {
      const nodata = c.status === "nodata";
      const last = clientLastClosedMonth(c) || clientLastMonth(c);
      const mom = clientMoMClosed(c);
      const active = state.selectedClient === c.id;
      const momCls = mom == null ? "text-slate-400" : mom >= 0 ? "text-[#16A34A]" : "text-[#DC2626]";
      const momArrow = mom == null ? "·" : mom >= 0 ? "↑" : "↓";

      return `
        <button
          data-client="${c.id}"
          ${nodata ? "disabled" : ""}
          class="group w-full text-left rounded-lg px-2.5 py-2 transition
            ${indent ? "ml-2" : ""}
            ${active ? "bg-[#F9F7FF] border-l-[3px] border-[#613BC0] pl-[9px]" : "border-l-[3px] border-transparent pl-[9px] hover:bg-slate-50 hover:border-[#613BC0]/30"}
            ${nodata ? "opacity-40 cursor-not-allowed hover:bg-transparent hover:border-transparent" : ""}">
          <div class="flex items-center justify-between gap-2">
            <span class="text-[13px] font-medium truncate ${active ? "text-[#613BC0]" : "text-slate-800"}">${c.name}</span>
            <span class="text-[11px] font-semibold tabular-nums ${momCls}">
              ${nodata ? "—" : `${momArrow} ${mom == null ? "—" : fmtPct(Math.abs(mom), 0)}`}
            </span>
          </div>
          <div class="mt-0.5 flex items-center justify-between gap-2">
            <span class="text-[11px] tabular-nums text-slate-500">${nodata ? "Sin datos" : fmtUSD(last ? last.ventas : 0)}</span>
            <span class="text-[10px] text-slate-400 uppercase tracking-wider">${last ? monthShort(last.month) : ""}</span>
          </div>
        </button>
      `;
    };

    const renderGroup = (g) => {
      const allMembers = g.members.map(clientById).filter(Boolean);
      const members = allMembers.filter((m) => !state.hideNoData || m.status !== "nodata");
      const gmv = members.reduce((s, m) => s + ((clientLastClosedMonth(m) || clientLastMonth(m))?.ventas || 0), 0);
      return `
        <div class="mb-2">
          <div class="flex items-center justify-between px-2.5 py-1.5 rounded-md bg-[#F9F7FF]">
            <span class="text-[11px] font-semibold tracking-wider text-[#613BC0] uppercase">${g.name}</span>
            <span class="text-[11px] font-semibold tabular-nums text-[#613BC0]">${fmtUSD(gmv)}</span>
          </div>
          <div class="mt-1 space-y-0.5">
            ${members.map((m) => renderClientCard(m, true)).join("")}
          </div>
        </div>
      `;
    };

    return `
      <div class="flex items-center justify-between px-3 pt-4 pb-2">
        <span class="text-[10px] font-semibold tracking-[0.15em] text-slate-400 uppercase">Clientes</span>
        <span class="text-[10px] text-slate-400 tabular-nums">${DATA.clients.filter(c=>c.status!=="nodata").length}/${DATA.clients.length}</span>
      </div>
      <div class="px-3 pb-3">
        <label class="flex items-center justify-between gap-2 cursor-pointer select-none">
          <span class="text-[11px] font-medium text-slate-600">Ocultar sin datos</span>
          <button data-hide-nodata class="relative inline-flex h-[18px] w-[30px] shrink-0 items-center rounded-full transition ${state.hideNoData ? "bg-[#613BC0]" : "bg-slate-300"}" role="switch" aria-checked="${state.hideNoData}">
            <span class="inline-block h-[14px] w-[14px] transform rounded-full bg-white shadow transition ${state.hideNoData ? "translate-x-[14px]" : "translate-x-[2px]"}"></span>
          </button>
        </label>
      </div>
      <div class="px-2 pb-4 space-y-2 overflow-y-auto" style="max-height: calc(100vh - 100px);">
        ${groups.map(renderGroup).join("")}
        <div class="mb-1 px-2.5 py-1.5">
          <span class="text-[11px] font-semibold tracking-wider text-slate-400 uppercase">Individuales</span>
        </div>
        <div class="space-y-0.5">
          ${ungrouped.filter((c) => !state.hideNoData || c.status !== "nodata").map((c) => renderClientCard(c)).join("")}
        </div>
      </div>
    `;
  }

  // ---------- Overview ----------
  function renderOverview() {
    const g = DATA.globals;
    const gmvSeries = computeGlobalMonthly();
    const lastGmv = gmvSeries[gmvSeries.length - 1];
    const prevGmv = gmvSeries[gmvSeries.length - 2];
    const gmvMoM = prevGmv ? (lastGmv - prevGmv) / prevGmv : 0;

    return `
      <div class="p-6 lg:p-8 space-y-6 mx-auto" style="max-width: 1600px;">
        ${renderOverviewHero(g, gmvSeries, gmvMoM)}
        ${renderMovimiento()}
        ${renderRanking()}
      </div>
    `;
  }

  function renderOverviewHero(g, gmvSeries, gmvMoM) {
    // Use latest CLOSED month for the MoM comparison (consistent with Movimiento del mes)
    const byMonth = computeGlobalMonthlyByMonth();
    const monthsOrdered = Object.keys(byMonth).sort();
    let closedIdx = monthsOrdered.length - 1;
    if (closedIdx >= 0 && isCurrentCalendarMonth(monthsOrdered[closedIdx]) && closedIdx >= 1) closedIdx -= 1;
    const closedYM = monthsOrdered[closedIdx];
    const prevYM = monthsOrdered[closedIdx - 1];
    const closedGmv = closedYM != null ? byMonth[closedYM] : null;
    const prevClosedGmv = prevYM != null ? byMonth[prevYM] : null;
    const closedMoM = (closedGmv != null && prevClosedGmv) ? (closedGmv - prevClosedGmv) / prevClosedGmv : null;
    if (closedMoM != null) gmvMoM = closedMoM;
    const lastGmv = closedGmv != null ? closedGmv : gmvSeries[gmvSeries.length - 1];
    const momMonthLabel = closedYM ? monthShort(closedYM) : "";
    const heroMomCls = gmvMoM == null ? "text-slate-400 border border-slate-200" : gmvMoM >= 0 ? "text-[#15803D] border border-[#15803D]/20" : "text-[#DC2626] border border-[#DC2626]/20";
    const heroMomArrow = gmvMoM == null ? "·" : gmvMoM >= 0 ? "↑" : "↓";

    const kpis = [
      { label: "Pedidos · últimos 12 meses", value: fmtNum(g.pedidos12m), sub: "órdenes procesadas" },
      { label: "Comercios activos", value: fmtNum(g.comerciosActivos), sub: `de ${fmtNum(g.comerciosRegistrados)} registrados` },
      { label: "Tasa activación global", value: fmtPct(g.comerciosActivos / g.comerciosRegistrados), sub: "comercios con al menos 1 orden" },
      { label: "Clientes activos", value: `${g.clientesActivos}/${g.clientesTotal}`, sub: `${g.clientesTotal - g.clientesActivos} sin actividad 12m` },
    ];

    return `
      <div class="grid grid-cols-12 gap-5">
        <!-- Hero GMV card -->
        <div class="col-span-12 lg:col-span-5 relative overflow-hidden rounded-2xl border border-[#613BC0]/15 bg-white p-7"
             style="background: radial-gradient(120% 100% at 0% 0%, #F9F7FF 0%, #FFFFFF 55%), linear-gradient(135deg, #F9F7FF 0%, #FFFFFF 60%, #FFF5EC 100%);">
          <div class="relative z-10">

  function renderMovimiento() {
    // Deltas use latest CLOSED month vs previous closed month (excludes in-progress)
    const rows = DATA.clients
      .filter((c) => c.status !== "nodata" && c.mensual && c.mensual.length >= 2)
      .map((c) => {
        const last = clientLastClosedMonth(c);
        const prev = clientPrevClosedMonth(c);
        if (!last || !prev) return null;
        const delta = last.ventas - prev.ventas;
        const pct = prev.ventas > 0 ? delta / prev.ventas : null;
        return { c, delta, pct, last, prev };
      })
      .filter(Boolean);

    const growing = rows.filter((r) => r.delta > 0).sort((a, b) => b.delta - a.delta).slice(0, 3);
    const falling = rows.filter((r) => r.delta < 0).sort((a, b) => a.delta - b.delta).slice(0, 3);

    const fmtSigned = (n) => (n >= 0 ? "+" : "\u2212") + fmtUSD(Math.abs(n));

    const row = (r, tone) => {
      const pctCls = tone === "up" ? "text-[#15803D] bg-[#DCFCE7]" : "text-[#DC2626] bg-[#FEE2E2]";
      const deltaCls = tone === "up" ? "text-[#15803D]" : "text-[#DC2626]";
      return `
        <button data-row-client="${r.c.id}" class="group w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[#F9F7FF] border border-transparent hover:border-[#613BC0]/20 transition text-left">
          <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-[#F9F7FF] to-white border border-[#613BC0]/15 flex items-center justify-center text-[11px] font-bold text-[#613BC0] shrink-0">${r.c.name.slice(0, 2).toUpperCase()}</div>
          <div class="min-w-0 flex-1">
            <div class="text-[13px] font-semibold text-slate-900 truncate">${r.c.name}</div>
            <div class="text-[11px] text-slate-500 tabular-nums">${fmtUSD(r.prev.ventas)} \u2192 ${fmtUSD(r.last.ventas)}</div>
          </div>
          <div class="text-right shrink-0">
            <div class="text-[14px] font-bold tabular-nums ${deltaCls}">${fmtSigned(r.delta)}</div>
            <span class="inline-flex items-center gap-0.5 rounded-full px-1.5 py-0.5 text-[10px] font-semibold tabular-nums ${pctCls}">${r.pct == null ? "—" : (r.pct >= 0 ? "↑" : "↓") + " " + fmtPct(Math.abs(r.pct), 1)}</span>
          </div>
          <span class="text-slate-300 group-hover:text-[#613BC0] transition">→</span>
        </button>
      `;
    };

    // Dynamic header label + progress note
    const refRow = rows[0];
    const headerLabel = refRow ? `${monthShort(refRow.last.month)} vs ${monthShort(refRow.prev.month)}` : "";
    const anyInProgress = DATA.clients.some((c) => {
      const last = c.mensual && c.mensual[c.mensual.length - 1];
      return last && isCurrentCalendarMonth(last.month);
    });
    const progressNote = anyInProgress ? " · mes en curso excluido" : "";

    const emptyGrow = `
      <div class="flex flex-col items-center justify-center text-center px-6 py-10 rounded-xl border border-dashed border-slate-200 bg-slate-50/60">
        <div class="h-10 w-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 text-[14px] mb-3">—</div>
        <div class="text-[13px] font-medium text-slate-700">Sin clientes creciendo en el mes cerrado</div>
        <div class="text-[11px] text-slate-500 mt-1">${headerLabel || "Sin datos comparables"}</div>
      </div>
    `;
    const emptyFall = `
      <div class="flex flex-col items-center justify-center text-center px-6 py-10 rounded-xl border border-dashed border-slate-200 bg-slate-50/60">
        <div class="h-10 w-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 text-[14px] mb-3">—</div>
        <div class="text-[13px] font-medium text-slate-700">Sin caídas en el mes cerrado</div>
      </div>
    `;

    return `
      <section>
        <div class="flex items-center justify-between mb-3">
          <div>
            <h2 class="text-[14px] font-semibold text-slate-900">Movimiento del mes</h2>
            <p class="text-[11px] text-slate-500">Ordenado por valor absoluto vs mes anterior${progressNote}</p>
          </div>
          <span class="text-[11px] text-slate-400 tabular-nums">${headerLabel}</span>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="rounded-2xl border border-slate-200 bg-white overflow-hidden">
            <header class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
              <div class="flex items-center gap-2">
                <span class="inline-flex h-6 w-6 items-center justify-center rounded-md bg-[#DCFCE7] text-[#15803D] text-[12px] font-bold">↗</span>
                <h3 class="text-[13px] font-semibold text-slate-900">Top 3 creciendo</h3>
              </div>
              <span class="text-[10px] font-semibold uppercase tracking-wider text-[#15803D]">${growing.length} ${growing.length === 1 ? "cliente" : "clientes"}</span>
            </header>
            <div class="p-2 space-y-1">
              ${growing.length === 0 ? emptyGrow : growing.map((r) => row(r, "up")).join("")}
            </div>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-white overflow-hidden">
            <header class="flex items-center justify-between px-5 py-3 border-b border-slate-100">

              <span class="text-[10px] font-semibold uppercase tracking-wider text-[#DC2626]">${falling.length} ${falling.length === 1 ? "cliente" : "clientes"}</span>
            </header>
            <div class="p-2 space-y-1">
              ${falling.length === 0 ? emptyFall : falling.map((r) => row(r, "down")).join("")}
            </div>
          </div>
        </div>
      </section>
    `;
  }

  function computeGlobalMonthlyByMonth() {
    const buckets = {};
    DATA.clients.forEach((c) => {
      (c.mensual || []).forEach((m) => { buckets[m.month] = (buckets[m.month] || 0) + m.ventas; });
    });
    return buckets;
  }
  function computeGlobalMonthly() {
    const buckets = computeGlobalMonthlyByMonth();
    const sorted = Object.keys(buckets).sort();
    return sorted.map((k) => buckets[k]);
  }

    const filteredMensual = applyPeriodFilter(c.mensual);
    const activeMonths = filteredMensual.filter((m) => m.ventas > 0);
    const periodoVentas = activeMonths.reduce((s, m) => s + m.ventas, 0);
    const periodoPedidos = activeMonths.reduce((s, m) => s + m.pedidos, 0);
    const avgVend = activeMonths.length ? activeMonths.reduce((s, m) => s + m.vendedores, 0) / activeMonths.length : 0;
    const avgCom = activeMonths.length ? activeMonths.reduce((s, m) => s + m.comercios, 0) / activeMonths.length : 0;
    const pctVend = (avgVend / (last?.registradosVend || 1)) * 100;

    const momCls = mom == null ? "text-slate-500" : mom >= 0 ? "text-[#15803D]" : "text-[#DC2626]";

  function renderClienteOps(c) {
    const filteredMensual = applyPeriodFilter(c.mensual);
    const activeFilt = filteredMensual.filter((m) => m.ventas > 0);
    const last = activeFilt.length ? activeFilt[activeFilt.length - 1] : clientLastMonth(c);
    const prev = activeFilt.length > 1 ? activeFilt[activeFilt.length - 2] : clientPrevMonth(c);
    const avgVend = activeFilt.length ? activeFilt.reduce((s, m) => s + m.vendedores, 0) / activeFilt.length : 0;
    const avgCom = activeFilt.length ? activeFilt.reduce((s, m) => s + m.comercios, 0) / activeFilt.length : 0;
    const totalVentas = filteredMensual.reduce((s, m) => s + m.ventas, 0);
    const totalPedidos = filteredMensual.reduce((s, m) => s + m.pedidos, 0);
    const ticket = totalPedidos > 0 ? totalVentas / totalPedidos : 0;
    const ventaPorVend = avgVend > 0 ? (last?.ventas || 0) / avgVend : 0;
    const pedPorVend = avgVend > 0 ? (last?.pedidos || 0) / avgVend : 0;
    const pedPorCom = avgCom > 0 ? (last?.pedidos || 0) / avgCom : 0;
    const comPorVend = avgVend > 0 ? avgCom / avgVend : 0;
    const varMes = prev && prev.ventas ? ((last.ventas - prev.ventas) / prev.ventas) : 0;

    const ops = [
      { label: "Ticket promedio", value: fmtUSD(ticket, { compact: false }), sub: "USD / pedido" },
      { label: "Venta por vendedor", value: fmtUSD(ventaPorVend), sub: "mes · USD" },
      { label: "Pedidos por vendedor", value: pedPorVend.toFixed(1), sub: "ped. / vendedor" },
      { label: "Pedidos por comercio", value: pedPorCom.toFixed(1), sub: "ped. / comercio" },
      { label: "Comercios por vendedor", value: comPorVend.toFixed(1), sub: "comerc. / vendedor" },
      { label: "Ventas último mes", value: fmtUSD(last?.ventas || 0), sub: last ? monthShort(last.month) : "" },
      { label: "Var. mes anterior", value: (varMes >= 0 ? "↑" : "↓") + " " + fmtPct(Math.abs(varMes), 1), sub: "MoM %" },
      { label: "Cuentas vendedor reg.", value: fmtNum(last?.registradosVend || 0), sub: "total registradas" },
    ];

    return `
      <section class="rounded-2xl border border-slate-200 bg-white overflow-hidden">
        <button data-ops-toggle class="w-full flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition">
          <div class="flex items-center gap-2">
            <span class="text-[11px] text-slate-400 transition-transform ${state.opsOpen ? "rotate-90" : ""}">▶</span>
            <h2 class="text-[14px] font-semibold text-slate-900">Métricas operacionales</h2>
            <span class="text-[11px] text-slate-400">8 indicadores</span>
          </div>
          <span class="text-[11px] text-[#613BC0] font-medium">${state.opsOpen ? "Ocultar" : "Mostrar"}</span>
        </button>
        ${state.opsOpen ? `
          <div class="px-6 pb-6 pt-1">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              ${ops.map((o) => `
                <div class="rounded-lg border border-slate-150 bg-slate-50/50 p-4">
                  <div class="text-[10px] font-semibold tracking-wider text-slate-400 uppercase">${o.label}</div>
                  <div class="mt-2 text-[20px] font-bold tabular-nums text-slate-900">${o.value}</div>
                  <div class="mt-0.5 text-[11px] text-slate-500">${o.sub}</div>
                </div>
              `).join("")}
            </div>
          </div>
        ` : ""}
      </section>
    `;
  }

  function renderClienteTable(c) {
    const months = applyPeriodFilter(c.mensual);
    const total = months.reduce((acc, m) => {
      acc.ventas += m.ventas;
      acc.pedidos += m.pedidos;
      acc.comercios += m.comercios;
      acc.vendedores += m.vendedores;
      return acc;
    }, { ventas: 0, pedidos: 0, comercios: 0, vendedores: 0 });
    const activeM = months.filter((m) => m.vendedores > 0 && m.ventas > 0);
    const activeCom = months.filter((m) => m.comercios > 0);
    const avg = {
      ticket: total.pedidos > 0 ? total.ventas / total.pedidos : 0,
      actCom: months.length ? months.reduce((s, m) => s + (m.registradosCom ? m.comercios / m.registradosCom : 0), 0) / months.length : 0,
      ventaVend: activeM.length ? activeM.reduce((s, m) => s + m.ventas / m.vendedores, 0) / activeM.length : 0,
      pedVend: activeM.length ? activeM.reduce((s, m) => s + m.pedidos / m.vendedores, 0) / activeM.length : 0,
      pedCom: activeCom.length ? activeCom.reduce((s, m) => s + m.pedidos / m.comercios, 0) / activeCom.length : 0,
    };

    const rows = months.map((m, i) => {
      const prev = i > 0 ? months[i - 1].ventas : null;
      const mom = prev && prev > 0 ? (m.ventas - prev) / prev : null;
      const actCom = m.registradosCom ? m.comercios / m.registradosCom : 0;
      const tkt = m.pedidos > 0 ? m.ventas / m.pedidos : 0;
      const ventaVend = m.vendedores > 0 ? m.ventas / m.vendedores : 0;
      const pedVend = m.vendedores > 0 ? m.pedidos / m.vendedores : 0;
      const pedCom = m.comercios > 0 ? m.pedidos / m.comercios : 0;
      return { m, mom, actCom, tkt, ventaVend, pedVend, pedCom };
    });

    const momBadge = (mom) => {
      if (mom == null) return `<span class="text-slate-300">—</span>`;
      const cls = mom > 0.05 ? "bg-[#DCFCE7] text-[#15803D]" : mom < -0.05 ? "bg-[#FEE2E2] text-[#DC2626]" : "bg-slate-100 text-slate-500";
      const arr = mom > 0 ? "↑" : mom < 0 ? "↓" : "·";
      return `<span class="inline-flex items-center gap-0.5 rounded-full px-2 py-0.5 text-[10px] font-semibold tabular-nums ${cls}">${arr} ${fmtPct(Math.abs(mom), 1)}</span>`;
    };

    const cols = state.allColumns
      ? ["Mes", "Pedidos", "Vendedores", "Ctas. vend. reg.", "Comercios", "% Activación", "Ventas", "Venta / vend.", "Ticket prom.", "Ped. / vend.", "Ped. / comercio", "MoM %"]
      : ["Mes", "Ventas", "Pedidos", "Comercios", "MoM %"];

    return `
      <section class="rounded-2xl border border-slate-200 bg-white overflow-hidden">
        <header class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
          <div>
            <h2 class="text-[14px] font-semibold text-slate-900">Desglose mensual</h2>
            <p class="text-[12px] text-slate-500">${months.length} meses · moneda USD</p>
          </div>
          <button data-toggle-cols class="text-[12px] font-medium text-[#613BC0] hover:underline">
            ${state.allColumns ? "← Vista compacta" : "Ver todas las métricas →"}
          </button>
        </header>
        <div class="overflow-x-auto">
          <table class="w-full text-[13px]">
            <thead>
              <tr class="text-[10px] uppercase tracking-wider text-slate-400 border-b border-slate-100 bg-slate-50/60">
                ${cols.map((c, i) => `<th class="font-semibold px-4 py-2.5 ${i === 0 ? "text-left" : "text-right"}">${c}</th>`).join("")}
              </tr>
            </thead>
            <tbody class="tabular-nums">
              ${rows.map((r) => {
                if (state.allColumns) {
                  return `
                    <tr class="border-b border-slate-50 hover:bg-[#F9F7FF]/50 transition">
                      <td class="px-4 py-3 text-left font-medium text-slate-800">${monthShort(r.m.month)}</td>
                      <td class="px-4 py-3 text-right">${fmtNum(r.m.pedidos)}</td>
                      <td class="px-4 py-3 text-right">${fmtNum(r.m.vendedores)}</td>
                      <td class="px-4 py-3 text-right text-slate-500">${fmtNum(r.m.registradosVend)}</td>
                      <td class="px-4 py-3 text-right">${fmtNum(r.m.comercios)}</td>
                      <td class="px-4 py-3 text-right text-slate-600">${fmtPct(r.actCom, 1)}</td>
                      <td class="px-4 py-3 text-right font-semibold text-slate-900">${fmtUSD(r.m.ventas)}</td>
                      <td class="px-4 py-3 text-right">${fmtUSD(r.ventaVend)}</td>
                      <td class="px-4 py-3 text-right">${fmtUSD(r.tkt, { compact: false })}</td>
                      <td class="px-4 py-3 text-right">${r.pedVend.toFixed(1)}</td>
                      <td class="px-4 py-3 text-right">${r.pedCom.toFixed(1)}</td>
                      <td class="px-4 py-3 text-right">${momBadge(r.mom)}</td>
                    </tr>
                  `;
                }
                return `
                  <tr class="border-b border-slate-50 hover:bg-[#F9F7FF]/50 transition">
                    <td class="px-4 py-3 text-left font-medium text-slate-800">${monthShort(r.m.month)}</td>
                    <td class="px-4 py-3 text-right font-semibold text-slate-900">${fmtUSD(r.m.ventas)}</td>
                    <td class="px-4 py-3 text-right">${fmtNum(r.m.pedidos)}</td>
                    <td class="px-4 py-3 text-right">${fmtNum(r.m.comercios)}</td>
                    <td class="px-4 py-3 text-right">${momBadge(r.mom)}</td>
                  </tr>
                `;
              }).join("")}
              <tr class="bg-[#F9F7FF]/70 border-t-2 border-[#613BC0]/15 font-semibold">
                <td class="px-4 py-3 text-left text-[#613BC0] text-[11px] uppercase tracking-wider">Prom.</td>
                ${state.allColumns ? `
                  <td class="px-4 py-3 text-right">${fmtNum(Math.round(total.pedidos / Math.max(months.length,1)))}</td>
                  <td class="px-4 py-3 text-right">${fmtNum(Math.round(total.vendedores / Math.max(months.length,1)))}</td>
                  <td class="px-4 py-3 text-right text-slate-500">${fmtNum(months[months.length-1]?.registradosVend || 0)}</td>
                  <td class="px-4 py-3 text-right">${fmtNum(Math.round(total.comercios / Math.max(months.length,1)))}</td>
                  <td class="px-4 py-3 text-right">${fmtPct(avg.actCom, 1)}</td>
                  <td class="px-4 py-3 text-right text-slate-900">${fmtUSD(total.ventas / Math.max(months.length,1))}</td>
                  <td class="px-4 py-3 text-right">${avg.ventaVend > 0 ? fmtUSD(avg.ventaVend) : "—"}</td>
                  <td class="px-4 py-3 text-right">${fmtUSD(avg.ticket, { compact: false })}</td>
                  <td class="px-4 py-3 text-right">${avg.pedVend > 0 ? avg.pedVend.toFixed(1) : "—"}</td>
                  <td class="px-4 py-3 text-right">${avg.pedCom > 0 ? avg.pedCom.toFixed(1) : "—"}</td>
                  <td class="px-4 py-3 text-right">—</td>
                ` : `
                  <td class="px-4 py-3 text-right text-slate-900">${fmtUSD(total.ventas / Math.max(months.length,1))}</td>
                  <td class="px-4 py-3 text-right">${fmtNum(Math.round(total.pedidos / Math.max(months.length,1)))}</td>
                  <td class="px-4 py-3 text-right">${fmtNum(Math.round(total.comercios / Math.max(months.length,1)))}</td>
                  <td class="px-4 py-3 text-right">—</td>
                `}
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    `;
  }

    ];
    const selected = state.compareIds;

    const entities = selected.map((id) => entityById(id)).filter(Boolean);
    const bestBy = (key) => Math.max(...entities.map((e) => e.metrics[key] || 0));

    return `
      <div class="p-6 lg:p-8 space-y-6 mx-auto" style="max-width: 1600px;">

          <h1 class="text-[22px] font-bold text-slate-900 tracking-tight">Comparativa</h1>
          <p class="text-[13px] text-slate-500 mt-1">Elige 2–4 entidades — clientes o grupos — para benchmark lado a lado.</p>
        </header>

              <select id="cmpAdd" class="text-[12px] border border-slate-200 rounded-full px-3 py-1.5 bg-white">
                <option value="">＋ Añadir…</option>
                <optgroup label="Grupos">
                  ${selectable.filter(s => s.kind === "group").map(s => `<option value="${s.id}">${s.name}</option>`).join("")}
                </optgroup>

  function entityById(id) {
    if (id.startsWith("group:")) {
      const g = DATA.groups.find((x) => x.id === id.slice(6));
      if (!g) return null;
      const members = g.members.map(clientById).filter((m) => m && m.status !== "nodata");
      if (members.length === 0) return null;
      // aggregate mensual
      const months = {};
      members.forEach((m) => m.mensual.forEach((row) => {
        if (!months[row.month]) months[row.month] = { month: row.month, ventas: 0, pedidos: 0, comercios: 0, vendedores: 0, registradosVend: 0, registradosCom: 0 };
        months[row.month].ventas += row.ventas;
        months[row.month].pedidos += row.pedidos;
        months[row.month].comercios += row.comercios;
        months[row.month].vendedores += row.vendedores;
        months[row.month].registradosVend += row.registradosVend;
        months[row.month].registradosCom += row.registradosCom;
      }));
      const mensual = Object.values(months).sort((a, b) => a.month.localeCompare(b.month));
      return buildEntity(g.name, mensual, "group", id);
    }
    const c = clientById(id);
    if (!c) return null;
    return buildEntity(c.name, c.mensual, "client", c.id);
  }

  function buildEntity(name, mensual, kind, id) {
    const gmv = mensual.reduce((s, m) => s + m.ventas, 0);
    const totalPedidos = mensual.reduce((s, m) => s + m.pedidos, 0);
    const activeMonths = mensual.filter((m) => m.ventas > 0);
    const avgVend = activeMonths.length ? activeMonths.reduce((s, m) => s + m.vendedores, 0) / activeMonths.length : 0;
    const avgCom = activeMonths.length ? activeMonths.reduce((s, m) => s + m.comercios, 0) / activeMonths.length : 0;
    const lastRegVend = mensual[mensual.length - 1]?.registradosVend || 0;
    const ticket = totalPedidos > 0 ? gmv / totalPedidos : 0;
    const ventaPorVend = avgVend > 0 ? (mensual[mensual.length - 1]?.ventas || 0) / avgVend : 0;
    const pedPorCom = avgCom > 0 ? (mensual[mensual.length - 1]?.pedidos || 0) / avgCom : 0;
    const actVend = lastRegVend > 0 ? avgVend / lastRegVend : 0;

    return {
      id, name, kind, mensual, gmv,
      metrics: {
        actVend: actVend,
        ticket: ticket,
        ventaPorVend: ventaPorVend,
        pedPorCom: pedPorCom,
      },
    };
  }

  function renderCmpCard(e, bestBy) {
    const spark = e.mensual.map((m) => m.ventas);
    const bar = (value, key, label, fmt) => {
      const best = bestBy(key) || 1;
      const pct = Math.max(2, Math.min(100, (value / best) * 100));
      const isBest = value === best;
      return `
        <div>
          <div class="flex items-center justify-between text-[11px]">
            <span class="text-slate-500">${label}</span>
            <span class="tabular-nums font-semibold text-slate-900 ${isBest ? "text-[#15803D]" : ""}">${fmt(value)}</span>
          </div>
          <div class="mt-1 h-1.5 rounded-full bg-slate-100 overflow-hidden">
            <div class="h-full rounded-full ${isBest ? "bg-[#61CE70]" : "bg-[#613BC0]"}" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    };
    return `
      <article class="rounded-2xl border border-slate-200 bg-white p-5 space-y-4 hover:border-[#613BC0]/30 hover:shadow-[0_1px_4px_rgba(0,0,0,0.05)] transition">
        <header class="flex items-center justify-between gap-2">
          <div class="min-w-0">
            <div class="text-[10px] font-semibold tracking-wider text-slate-400 uppercase">${e.kind === "group" ? "Grupo" : "Cliente"}</div>
            <h3 class="text-[15px] font-semibold text-slate-900 truncate">${e.name}</h3>
          </div>
          <div class="h-8 w-20 shrink-0">${sparkline(spark, { w: 80, h: 28, stroke: "#613BC0" })}</div>
        </header>
        <div>
          <div class="text-[10px] font-semibold tracking-wider text-slate-400 uppercase">GMV 12m</div>
          <div class="text-[24px] font-bold tabular-nums text-slate-900 leading-none mt-1">${fmtUSD(e.gmv)}</div>
        </div>
        <div class="space-y-2.5 pt-2 border-t border-slate-100">
          ${bar(e.metrics.actVend, "actVend", "% activación vendedores", (v) => fmtPct(v, 1))}
          ${bar(e.metrics.ticket, "ticket", "Ticket promedio", (v) => fmtUSD(v, { compact: false }))}
          ${bar(e.metrics.ventaPorVend, "ventaPorVend", "Venta / vendedor", (v) => fmtUSD(v))}
          ${bar(e.metrics.pedPorCom, "pedPorCom", "Pedidos / comercio", (v) => v.toFixed(1) + "×")}
        </div>
      </article>
    `;
  }

  function renderCmpChart(entities) {
    const metrics = [
      { id: "ventas", label: "Ventas" },
      { id: "pedidos", label: "Pedidos" },
      { id: "comercios", label: "Comercios activos" },

    return `

    `;
  }

  // ---------- Chart rendering ----------
  let chartInstances = {};
  function destroyCharts() {
    Object.values(chartInstances).forEach((ch) => ch && ch.destroy());
    chartInstances = {};
  }
  function afterRender() {
    destroyCharts();
    if (state.view === "cliente") drawClienteChart();
    if (state.view === "comparativa") drawCmpChart();
  }

  function drawClienteChart() {
    const c = clientById(state.selectedClient);
    const ctx = document.getElementById("clienteChart");
    if (!ctx || !c) return;
    const filtered = applyPeriodFilter(c.mensual);
    const labels = filtered.map((m) => monthShort(m.month));
    const values = filtered.map((m) => m[state.clienteMetric] || 0);
    const momValues = filtered.map((m, i) => {
      if (i === 0) return null;
      const prev = filtered[i - 1][state.clienteMetric];
      if (!prev) return null;
      return (((m[state.clienteMetric] || 0) - prev) / prev) * 100;
    });
    chartInstances.cliente = new Chart(ctx, {
      data: {
        labels,
        datasets: [
          {
            type: "bar",
            label: "Valor",
            data: values,
            backgroundColor: "#613BC0",
            borderRadius: 6,
            yAxisID: "y",
            maxBarThickness: 46,
          },
          {
            type: "line",
            label: "Var. mensual %",
            data: momValues,
            borderColor: "#FFBC7D",
            backgroundColor: "#FFBC7D",
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: "#FFBC7D",
            tension: 0.25,
            yAxisID: "y1",
            spanGaps: true,
          },
        ],
      },
      options: chartBaseOpts({ dualAxis: true, valueFormatter: state.clienteMetric === "ventas" ? (v) => fmtUSD(v) : (v) => fmtNum(v) }),
    });
  }

  function drawCmpChart() {
    const ctx = document.getElementById("cmpChart");
    if (!ctx) return;
    const entities = state.compareIds.map(entityById).filter(Boolean);
    // union of months
    const monthsSet = new Set();
    entities.forEach((e) => e.mensual.forEach((m) => monthsSet.add(m.month)));
    const months = Array.from(monthsSet).sort();
    const palette = ["#613BC0", "#61CE70", "#FFBC7D", "#DC2626", "#0EA5E9"];
    const datasets = entities.map((e, idx) => {
      const byMonth = Object.fromEntries(e.mensual.map((m) => [m.month, m]));
      return {
        label: e.name,
        data: months.map((mm) => (byMonth[mm] ? byMonth[mm][state.compareMetric] : null)),
        borderColor: palette[idx % palette.length],
        backgroundColor: palette[idx % palette.length] + "22",
        borderWidth: 2.5,
        pointRadius: 3,
        tension: 0.3,
        spanGaps: true,
      };
    });
    chartInstances.cmp = new Chart(ctx, {
      type: "line",
      data: { labels: months.map(monthShort), datasets },
      options: chartBaseOpts({ dualAxis: false, valueFormatter: state.compareMetric === "ventas" ? (v) => fmtUSD(v) : (v) => fmtNum(v), showLegend: true }),
    });
  }

  function chartBaseOpts({ dualAxis, valueFormatter, showLegend = false }) {
    return {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: showLegend
          ? { position: "bottom", labels: { boxWidth: 10, boxHeight: 10, usePointStyle: true, font: { size: 11, family: "'Helvetica Neue', Helvetica, Arial, sans-serif" }, color: "#64748B" } }
          : { display: false },
        tooltip: {
          backgroundColor: "#0F172A",
          titleColor: "#FFFFFF",
          bodyColor: "#E2E8F0",
          padding: 10,
          cornerRadius: 8,
          titleFont: { family: "'Helvetica Neue', Helvetica, Arial, sans-serif", size: 12 },
          bodyFont: { family: "'Helvetica Neue', Helvetica, Arial, sans-serif", size: 12 },
          callbacks: {
            label: (ctx) => {
              const v = ctx.parsed.y;
              if (v == null) return ctx.dataset.label + ": —";
              if (ctx.dataset.yAxisID === "y1") return `${ctx.dataset.label}: ${v.toFixed(1)}%`;
              return `${ctx.dataset.label}: ${valueFormatter(v)}`;
            },
          },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: "#94A3B8", font: { size: 11, family: "'Helvetica Neue'" } },
        },
        y: {
          position: "left",
          grid: { color: "#F1F5F9", drawBorder: false },
          ticks: {
            color: "#94A3B8",
            font: { size: 11, family: "'Helvetica Neue'" },
            callback: (v) => valueFormatter(v),
          },
        },
        ...(dualAxis
          ? {
              y1: {
                position: "right",
                grid: { display: false },
                ticks: { color: "#FFBC7D", font: { size: 11, family: "'Helvetica Neue'" }, callback: (v) => `${v.toFixed(0)}%` },
              },
            }
          : {}),
      },
    };
  }

  // ---------- Event binding ----------
  function bind() {
    document.querySelectorAll("[data-tab]").forEach((b) => b.addEventListener("click", () => setView(b.dataset.tab)));
    document.querySelectorAll("[data-currency]").forEach((b) => b.addEventListener("click", () => { state.displayCurrency = b.dataset.currency; render(); }));
    document.querySelectorAll("[data-client]").forEach((b) => b.addEventListener("click", () => selectClient(b.dataset.client)));
    document.querySelectorAll("[data-row-client]").forEach((b) => b.addEventListener("click", () => selectClient(b.dataset.rowClient)));
    document.querySelectorAll("[data-alert-client]").forEach((b) => b.addEventListener("click", () => selectClient(b.dataset.alertClient)));
    document.querySelectorAll("[data-sort]").forEach((b) => b.addEventListener("click", () => { state.rankingSort = b.dataset.sort; render(); }));
    document.querySelectorAll("[data-cli-metric]").forEach((b) => b.addEventListener("click", () => { state.clienteMetric = b.dataset.cliMetric; render(); }));
    document.querySelectorAll("[data-cmp-metric]").forEach((b) => b.addEventListener("click", () => { state.compareMetric = b.dataset.cmpMetric; render(); }));
    document.querySelectorAll("[data-period]").forEach((b) => b.addEventListener("click", () => { state.cliPeriod = b.dataset.period; render(); }));
    const ops = document.querySelector("[data-ops-toggle]");
    if (ops) ops.addEventListener("click", () => { state.opsOpen = !state.opsOpen; render(); });
    const hideNoData = document.querySelector("[data-hide-nodata]");
    if (hideNoData) hideNoData.addEventListener("click", (e) => { e.preventDefault(); state.hideNoData = !state.hideNoData; render(); });
    const toggleCols = document.querySelector("[data-toggle-cols]");
    if (toggleCols) toggleCols.addEventListener("click", () => { state.allColumns = !state.allColumns; render(); });
    document.querySelectorAll("[data-remove-cmp]").forEach((b) => b.addEventListener("click", () => {
      state.compareIds = state.compareIds.filter((x) => x !== b.dataset.removeCmp);
      render();
    }));
    const cmpAdd = document.getElementById("cmpAdd");
    if (cmpAdd) cmpAdd.addEventListener("change", (e) => {
      if (!e.target.value) return;
      if (state.compareIds.length >= 4) { e.target.value = ""; return; }
      if (!state.compareIds.includes(e.target.value)) state.compareIds.push(e.target.value);
      e.target.value = "";
      render();
    });
  }

  // ---------- Init ----------
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();

</script>


</body></html>
