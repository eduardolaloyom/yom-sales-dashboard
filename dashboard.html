<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOM Sales Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; }
    .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
    .client-card { cursor: pointer; transition: all 0.15s; }
    .client-card:hover { border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59,130,246,0.12); transform: translateY(-1px); }
    .client-card.active { border-color: #2563eb; background: #eff6ff; }
    .client-card.no-data { opacity: 0.45; cursor: default; pointer-events: none; }
    .up   { color: #16a34a; }
    .down { color: #dc2626; }
    .flat { color: #94a3b8; }
    #chart-wrap { position: relative; height: 280px; }
    .metric-tab { transition: all 0.12s; border-bottom: 2px solid transparent; }
    .metric-tab.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 600; }
    th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #64748b; }
    th[title] { cursor: help; border-bottom: 1px dashed #cbd5e1; }
    .mom-positive { background: #dcfce7; color: #15803d; border-radius: 4px; padding: 1px 5px; font-size: 11px; font-weight: 600; }
    .mom-negative { background: #fee2e2; color: #b91c1c; border-radius: 4px; padding: 1px 5px; font-size: 11px; font-weight: 600; }
    .mom-flat     { background: #f1f5f9; color: #64748b; border-radius: 4px; padding: 1px 5px; font-size: 11px; font-weight: 600; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Topbar -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
  <div class="max-w-screen-xl mx-auto px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">Y</div>
      <span class="font-semibold text-gray-900">YOM Sales</span>
      <span class="text-xs text-gray-400 hidden sm:block">Legacy Production · Todos los montos en pesos chilenos ($)</span>
    </div>
    <div class="flex items-center gap-4">
      <div id="hdr-gmv" class="text-right hidden md:block">
        <div class="font-bold text-gray-900 text-sm" id="hdr-total">—</div>
        <div class="text-xs text-gray-400">Ventas (12m)</div>
      </div>
      <div class="text-xs text-gray-400" id="hdr-ts">—</div>
    </div>
  </div>
</header>

<!-- Layout sidebar + main -->
<div style="display:flex; height:calc(100vh - 56px); overflow:hidden;">

  <!-- Sidebar clientes -->
  <aside style="width:200px; min-width:200px; overflow-y:auto; border-right:1px solid #e2e8f0; background:white; padding:10px 8px;">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide px-2 mb-2">Clientes</p>
    <div id="client-grid" class="flex flex-col gap-1.5"></div>
  </aside>

  <!-- Contenido principal -->
  <main style="flex:1; overflow-y:auto; background:#f1f5f9; padding:20px; min-width:0; display:flex; flex-direction:column; gap:16px;">

    <!-- KPIs Globales -->
    <div id="global-kpis" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

    <!-- Detalle cliente -->
    <div id="detail" class="hidden" style="flex-direction:column; gap:16px;">

      <!-- Header + KPIs + Gráfico -->
      <div class="card p-5">
        <div class="flex items-center gap-2 mb-0.5">
          <h2 id="d-name" class="text-xl font-bold text-gray-900"></h2>
          <span id="d-badge" class="hidden text-xs font-semibold bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full">COP→CLP</span>
        </div>
        <p id="d-period" class="text-xs text-gray-400 mb-3"></p>

        <!-- Selector de período -->
        <div id="period-selector" class="mb-4 space-y-1.5">
          <div id="year-pills" class="flex flex-wrap gap-1.5"></div>
          <div id="month-pills" class="flex flex-wrap gap-1.5 hidden"></div>
        </div>

        <!-- KPI cards -->
        <div id="d-kpis" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-5"></div>

        <!-- Tabs métricas -->
        <div class="flex gap-5 border-b border-gray-100 mb-3">
          <button class="metric-tab active pb-2 text-sm" data-metric="ventaSinIVA">Ventas</button>
          <button class="metric-tab pb-2 text-sm text-gray-500" data-metric="ordenes">Órdenes</button>
          <button class="metric-tab pb-2 text-sm text-gray-500" data-metric="comerciosActivos">Comercios activos</button>
          <button class="metric-tab pb-2 text-sm text-gray-500" data-metric="vendedoresActivos">Vendedores activos</button>
        </div>

        <div id="chart-wrap"><canvas id="chart"></canvas></div>
      </div>

      <!-- Tabla mensual -->
      <div class="card overflow-hidden">
        <div class="px-5 py-3 border-b border-gray-100">
          <h3 id="table-title" class="font-semibold text-gray-800 text-sm">Desglose mensual</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm" style="min-width:900px">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left whitespace-nowrap w-20">Mes</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Total de órdenes procesadas en el mes">Pedidos</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Vendedores distintos con al menos 1 pedido en el mes">Vendedores</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Total de cuentas de vendedor creadas para este cliente — base facturable de YOM">Ctas. Vend.</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Comercios distintos que realizaron al menos 1 pedido en el mes">Comercios</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Comercios activos en el mes vs. total registrados en la plataforma">% Activación</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Ventas totales del mes (pricing.discountedTotalPrice)">Ventas</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Ventas del mes divididas entre vendedores activos">Venta / vendedor</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Ticket promedio: ventas divididas entre número de pedidos">Ticket promedio</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Pedidos del mes divididos entre vendedores activos — productividad por vendedor">Pedidos / vendedor</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Pedidos del mes divididos entre comercios activos — frecuencia de recompra">Pedidos / comercio</th>
                <th class="px-4 py-3 text-right whitespace-nowrap" title="Variación porcentual de ventas respecto al mes anterior">Var. vs mes ant.</th>
              </tr>
            </thead>
            <tbody id="monthly-tbody"></tbody>
            <tfoot id="monthly-tfoot" class="bg-gray-50 border-t-2 border-gray-200 font-semibold text-gray-800"></tfoot>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
// ── Helpers de formato ────────────────────────────────────
const clp  = n => n == null ? '—' : new Intl.NumberFormat('es-CL', { style:'currency', currency:'CLP', maximumFractionDigits:0 }).format(n);
const clpM = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (Math.abs(n) >= 1e9)  return '$' + (n/1e9).toFixed(1)  + 'B';
  if (Math.abs(n) >= 1e6)  return '$' + (n/1e6).toFixed(1)  + 'M';
  if (Math.abs(n) >= 1e3)  return '$' + (n/1e3).toFixed(0)  + 'K';
  return clp(n);
};
const pct  = n => n == null ? '—' : n.toFixed(1) + '%';
const num  = n => n == null ? '—' : new Intl.NumberFormat('es-CL').format(n);
const MONTHS = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const mLabel = (y,m) => `${MONTHS[m]} ${String(y).slice(2)}`;
const dateStr = iso => iso ? new Date(iso).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}) : '—';

function mom(arr, i, field) {
  if (i === 0 || !arr[i-1][field]) return null;
  return (arr[i][field] - arr[i-1][field]) / arr[i-1][field] * 100;
}
function momBadge(val) {
  if (val == null) return '<span class="mom-flat">—</span>';
  const sign = val >= 0.5 ? '↑' : val <= -0.5 ? '↓' : '→';
  const cls  = val >= 0.5 ? 'mom-positive' : val <= -0.5 ? 'mom-negative' : 'mom-flat';
  return `<span class="${cls}">${sign} ${Math.abs(val).toFixed(1)}%</span>`;
}

// ── Estado ────────────────────────────────────────────────
let activeClient = null, activeChart = null, activeMetric = 'ventaSinIVA';
let activeFilter = { year: null, month: null };

// ── Init ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (typeof YOM_DATA === 'undefined') {
    document.body.innerHTML = `<div class="flex items-center justify-center h-screen flex-col gap-3 text-gray-400">
      <p class="text-lg font-semibold">Sin datos cargados</p>
      <code class="bg-gray-100 text-gray-600 text-sm px-3 py-2 rounded">mongosh "&lt;URI&gt;" --quiet --file extract.js > data.js</code>
    </div>`;
    return;
  }

  // Timestamp
  const d = new Date(YOM_DATA.extractedAt);
  document.getElementById('hdr-ts').textContent = 'Actualizado ' + d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});

  renderGlobal();
  renderGrid();
  setupTabs();

  // Abrir primer cliente con datos
  const first = YOM_DATA.clients.find(c => !c.sinDatos && c.mensual.length);
  if (first) openClient(first);
});

// ── KPIs globales (últimos 12 meses, solo CLP) ───────────
function renderGlobal() {
  const cl = YOM_DATA.clients.filter(c => !c.sinDatos);

  // Sumar solo el período últimos 12m (usando mensual)
  let gmv12 = 0, ords12 = 0, coms12 = new Set();
  cl.forEach(c => {
    c.mensual.forEach(m => { gmv12 += m.ventaSinIVA; ords12 += m.ordenes; });
    c.mensual.forEach(m => { /* comercios distintos no disponible globalmente */ });
  });

  const totalComs = cl.reduce((a,c) => a + c.comercios, 0);
  const totalReg  = cl.reduce((a,c) => a + c.comerciosRegistrados, 0);
  const actRate   = totalReg > 0 ? (totalComs / totalReg * 100) : 0;

  document.getElementById('hdr-total').textContent = clpM(gmv12);

  document.getElementById('global-kpis').innerHTML = [
    { label: 'Ventas (12m)',              value: clpM(gmv12),         sub: cl.length + ' clientes activos',       color: 'text-blue-700' },
    { label: 'Pedidos (12m)',            value: num(ords12),          sub: 'órdenes procesadas',                  color: 'text-gray-900' },
    { label: 'Comercios activos',        value: num(totalComs),       sub: 'con al menos 1 orden',                color: 'text-gray-900' },
    { label: 'Tasa activación global',   value: pct(actRate),         sub: totalComs + ' de ' + num(totalReg) + ' registrados', color: actRate >= 50 ? 'text-green-700' : 'text-orange-600' },
  ].map(k => `
    <div class="card p-4 hover:shadow-md transition-shadow">
      <div class="text-2xl font-bold ${k.color}">${k.value}</div>
      <div class="text-sm font-medium text-gray-700 mt-1">${k.label}</div>
      <div class="text-xs text-gray-400 mt-0.5">${k.sub}</div>
    </div>
  `).join('');
}

// ── Sidebar clientes ──────────────────────────────────────
function renderGrid() {
  document.getElementById('client-grid').innerHTML = YOM_DATA.clients.map(c => {
    if (c.sinDatos) return `
      <div class="client-card no-data rounded-lg px-3 py-2">
        <div class="text-xs font-semibold text-gray-400">${c.name}</div>
        <div class="text-xs text-gray-300">Sin datos</div>
      </div>`;

    const last2 = c.mensual.slice(-2);
    const lastM = last2[last2.length - 1];
    const prevM = last2.length > 1 ? last2[0] : null;
    const momVal = lastM && prevM && prevM.ventaSinIVA
      ? (lastM.ventaSinIVA - prevM.ventaSinIVA) / prevM.ventaSinIVA * 100 : null;
    const momCls  = momVal == null ? 'flat' : momVal >= 0.5 ? 'up' : momVal <= -0.5 ? 'down' : 'flat';
    const momSign = momVal == null ? '' : momVal >= 0.5 ? '↑' : momVal <= -0.5 ? '↓' : '→';
    const inactivo = !lastM;

    return `
      <div class="client-card rounded-lg px-3 py-2.5 ${inactivo ? 'opacity-50' : ''}" data-domain="${c.domain}"
           style="border:1px solid #e2e8f0; background:white; cursor:pointer; transition:all 0.12s;">
        <div class="flex items-center justify-between gap-1">
          <span class="text-xs font-semibold text-gray-800 truncate">${c.name}</span>
          <span class="${momCls} text-xs font-bold whitespace-nowrap">${momSign}${momVal != null ? Math.abs(momVal).toFixed(0)+'%' : ''}</span>
        </div>
        <div class="text-sm font-bold ${inactivo ? 'text-gray-300' : 'text-blue-700'} leading-tight mt-0.5">
          ${lastM ? clpM(lastM.ventaSinIVA) : '—'}
        </div>
        <div class="text-xs text-gray-400">${lastM ? mLabel(lastM.year, lastM.month) : 'sin actividad'}</div>
      </div>`;
  }).join('');

  document.querySelectorAll('.client-card:not(.no-data)').forEach(el => {
    el.addEventListener('click', () => {
      const c = YOM_DATA.clients.find(x => x.domain === el.dataset.domain);
      openClient(c);
    });
  });
}

// ── Helpers de período ────────────────────────────────────
function getFilteredMonths(client, year, month) {
  if (!year) return client.mensual;
  if (!month) return client.mensual.filter(m => m.year === year);
  return client.mensual.filter(m => m.year === year && m.month === month);
}

function aggregateMonths(months, comerciosRegistrados, cuentasVendedor) {
  if (!months.length) return null;
  const n = months.length;
  const totOrd  = months.reduce((s,m) => s + m.ordenes, 0);
  const totVen  = months.reduce((s,m) => s + m.ventaSinIVA, 0);
  const avgCom  = months.reduce((s,m) => s + m.comerciosActivos, 0) / n;
  const avgVend = months.reduce((s,m) => s + m.vendedoresActivos, 0) / n;
  return {
    ordenes:       totOrd,
    ventaSinIVA:   totVen,
    avgComercios:  avgCom,
    avgVendedores: avgVend,
    actRate:       comerciosRegistrados > 0 ? avgCom / comerciosRegistrados * 100 : null,
    actRateVend:   cuentasVendedor > 0 ? Math.min(avgVend / cuentasVendedor * 100, 100) : null,
    ticket:        totOrd > 0 ? totVen / totOrd : 0,
    ventaXVend:    avgVend > 0 ? totVen / avgVend : 0,
    pedXVend:      avgVend > 0 ? totOrd / avgVend : 0,
    comXVend:      avgVend > 0 ? avgCom / avgVend : 0,
    pedXCom:       avgCom  > 0 ? totOrd / avgCom  : 0,
  };
}

// ── Selector de período ───────────────────────────────────
function renderPeriodSelector(client) {
  const years = [...new Set(client.mensual.map(m => m.year))].sort();
  const pill  = (label, active, onClick) =>
    `<button class="period-pill ${active
      ? 'bg-blue-600 text-white font-semibold'
      : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
    } rounded-full px-3 py-1 text-xs cursor-pointer border-0"
      onclick="${onClick}">${label}</button>`;

  const noYear = activeFilter.year === null;
  document.getElementById('year-pills').innerHTML =
    pill('Todo', noYear, 'setYear(null)') +
    years.map(y => pill(y, activeFilter.year === y, `setYear(${y})`)).join('');

  const monthPills = document.getElementById('month-pills');
  if (!activeFilter.year) {
    monthPills.classList.add('hidden');
    return;
  }
  const availMonths = client.mensual.filter(m => m.year === activeFilter.year).map(m => m.month);
  monthPills.classList.remove('hidden');
  monthPills.innerHTML =
    pill('Año completo', activeFilter.month === null, 'setMonth(null)') +
    availMonths.map(mo => pill(MONTHS[mo], activeFilter.month === mo, `setMonth(${mo})`)).join('');
}

function setYear(year) {
  activeFilter = { year, month: null };
  renderPeriodSelector(activeClient);
  applyFilter();
}
function setMonth(month) {
  activeFilter.month = month;
  renderPeriodSelector(activeClient);
  applyFilter();
}

// ── Aplicar filtro ────────────────────────────────────────
function applyFilter() {
  const months = getFilteredMonths(activeClient, activeFilter.year, activeFilter.month);
  const agg    = aggregateMonths(months, activeClient.comerciosRegistrados, activeClient.cuentasVendedor);
  renderKPIs(agg, months);
  renderChart(months);
  renderTable(months);
  // Etiqueta período
  const { year, month } = activeFilter;
  const label = !year ? 'últimos 12m' : !month ? String(year) : `${MONTHS[month]} ${year}`;
  document.getElementById('d-period').textContent =
    dateStr(activeClient.primeraOrden) + ' → ' + dateStr(activeClient.ultimaOrden) + ' · mostrando ' + label;
  document.getElementById('table-title').textContent = 'Desglose mensual — ' + label;
  // Sync sticky bar
}

// ── KPIs del período ──────────────────────────────────────
function renderKPIs(agg, months) {
  if (!agg) {
    document.getElementById('d-kpis').innerHTML = '<div class="col-span-4 text-xs text-gray-400 py-2">Sin datos para el período seleccionado</div>';
    return;
  }
  // MoM: último mes del período vs el anterior en el array completo
  const lastM = months[months.length - 1];
  const prevM = lastM ? activeClient.mensual.find(
    m => (m.year === lastM.year && m.month === lastM.month - 1) ||
         (m.month === 12 && lastM.month === 1 && m.year === lastM.year - 1)
  ) : null;
  const momGMV = lastM && prevM && prevM.ventaSinIVA
    ? (lastM.ventaSinIVA - prevM.ventaSinIVA) / prevM.ventaSinIVA * 100 : null;

  const ventaUltMes = lastM ? lastM.ventaSinIVA : null;

  document.getElementById('d-kpis').innerHTML = [
    { label: 'Ventas',                  value: clpM(agg.ventaSinIVA),                           sub: 'del período' },
    { label: 'Pedidos',                 value: num(agg.ordenes),                                sub: 'órdenes procesadas' },
    { label: 'Vendedores prom./mes',    value: agg.avgVendedores.toFixed(1),                    sub: 'activos promedio mensual' },
    { label: 'Comercios prom./mes',     value: agg.avgComercios.toFixed(1),                     sub: 'de ' + num(activeClient.comerciosRegistrados) + ' registrados' },
    { label: 'Ventas último mes',       value: clpM(ventaUltMes),                               sub: lastM ? mLabel(lastM.year, lastM.month) : '—' },
    { label: 'Var. mes anterior',       value: momBadge(momGMV),                                sub: lastM ? mLabel(lastM.year, lastM.month) : '—' },
    { label: 'Ticket promedio',         value: clpM(agg.ticket),                                sub: 'ventas / pedidos' },
    { label: '% Act. vendedores',       value: agg.actRateVend != null ? pct(agg.actRateVend) : '—', sub: agg.avgVendedores.toFixed(0) + ' activos de ' + num(activeClient.cuentasVendedor) + ' cuentas' },
    { label: 'Venta por vendedor',      value: clpM(agg.ventaXVend),                            sub: 'ventas / vendedores prom.' },
    { label: 'Pedidos por vendedor',    value: agg.pedXVend.toFixed(1) + 'x',                   sub: 'productividad vendedor' },
    { label: 'Comercios por vendedor',  value: agg.comXVend.toFixed(1),                         sub: 'cobertura promedio' },
    { label: 'Pedidos por comercio',    value: agg.pedXCom.toFixed(1) + 'x',                    sub: 'frecuencia de recompra' },
  ].map(k => `
    <div class="bg-gray-50 rounded-lg px-3 py-2.5 text-right">
      <div class="text-base font-bold text-gray-900">${k.value}</div>
      <div class="text-xs text-gray-600 leading-tight">${k.label}</div>
      <div class="text-xs text-gray-400">${k.sub}</div>
    </div>
  `).join('');
}

// ── Abrir cliente ─────────────────────────────────────────
function openClient(client) {
  activeClient = client;
  document.querySelectorAll('.client-card').forEach(el => el.classList.remove('active'));
  const card = document.querySelector(`.client-card[data-domain="${client.domain}"]`);
  if (card) card.classList.add('active');

  const detailEl = document.getElementById('detail');
  detailEl.style.display = 'flex';
  document.getElementById('d-name').textContent = client.name;

  // Badge COP si aplica
  const badge = document.getElementById('d-badge');
  if (client.currency === 'COP') badge.classList.remove('hidden');
  else badge.classList.add('hidden');

  // Seleccionar por defecto el año más reciente
  const years = [...new Set(client.mensual.map(m => m.year))].sort();
  activeFilter = { year: years[years.length - 1] ?? null, month: null };

  renderPeriodSelector(client);
  applyFilter();
  document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Gráfico ───────────────────────────────────────────────
function renderChart(mn) {
  if (activeChart) { activeChart.destroy(); activeChart = null; }
  if (!mn) mn = getFilteredMonths(activeClient, activeFilter.year, activeFilter.month);
  if (!mn.length) return;

  const labels = mn.map(m => mLabel(m.year, m.month));
  const vals   = mn.map(m => m[activeMetric]);
  const momVals = mn.map((m,i) => i === 0 ? null : mom(mn, i, activeMetric));

  const metricLabels = {
    ventaSinIVA: 'Ventas', vendedoresActivos: 'Vendedores activos',
    ordenes: 'Pedidos', comerciosActivos: 'Comercios activos'
  };
  const isMoney = activeMetric === 'ventaSinIVA';

  activeChart = new Chart(document.getElementById('chart'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: metricLabels[activeMetric],
          data: vals,
          backgroundColor: '#3b82f6',
          borderRadius: 5,
          yAxisID: 'y',
          order: 2
        },
        {
          type: 'line',
          label: 'Var. mensual %',
          data: momVals,
          borderColor: '#f59e0b',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#f59e0b',
          tension: 0.3,
          yAxisID: 'y2',
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 0) return ` ${metricLabels[activeMetric]}: ${isMoney ? clpM(ctx.raw) : num(ctx.raw)}`;
              if (ctx.raw == null) return null;
              return ` Var. mensual: ${ctx.raw >= 0 ? '+' : ''}${ctx.raw.toFixed(1)}%`;
            }
          }
        }
      },
      scales: {
        y: {
          position: 'left',
          grid: { color: '#f1f5f9' },
          ticks: { callback: v => isMoney ? clpM(v) : num(v), font: { size: 11 } }
        },
        y2: {
          position: 'right',
          grid: { display: false },
          ticks: { callback: v => (v == null ? '' : v.toFixed(1) + '%'), font: { size: 11 } }
        },
        x: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

// ── Tabla mensual ─────────────────────────────────────────
function renderTable(mn) {
  if (!mn) mn = getFilteredMonths(activeClient, activeFilter.year, activeFilter.month);
  const reg = activeClient.comerciosRegistrados;

  let totOrd=0, totSin=0;
  mn.forEach(m => { totOrd+=m.ordenes; totSin+=m.ventaSinIVA; });

  document.getElementById('monthly-tbody').innerHTML = mn.map((m, i) => {
    const momVal      = mom(mn, i, 'ventaSinIVA');
    const actPct      = reg > 0 ? m.comerciosActivos / reg * 100 : null;
    const ticket      = m.ordenes > 0 ? m.ventaSinIVA / m.ordenes : 0;
    const freqCom     = m.comerciosActivos  > 0 ? m.ordenes / m.comerciosActivos  : 0;
    const freqVend    = m.vendedoresActivos > 0 ? m.ordenes / m.vendedoresActivos : 0;
    const ventaVend   = m.vendedoresActivos > 0 ? m.ventaSinIVA / m.vendedoresActivos : 0;
    return `<tr class="border-t border-gray-50 hover:bg-blue-50/40">
      <td class="px-4 py-2.5 font-medium text-gray-800 whitespace-nowrap">${mLabel(m.year, m.month)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${num(m.ordenes)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${num(m.vendedoresActivos)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums text-gray-400">${num(activeClient.cuentasVendedor) || '—'}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${num(m.comerciosActivos)}</td>
      <td class="px-4 py-2.5 text-right">${actPct != null ? pct(actPct) : '—'}</td>
      <td class="px-4 py-2.5 text-right font-medium tabular-nums">${clpM(m.ventaSinIVA)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${clpM(ventaVend)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${clpM(ticket)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${freqVend.toFixed(1)}x</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${freqCom.toFixed(1)}x</td>
      <td class="px-4 py-2.5 text-right">${momBadge(momVal)}</td>
    </tr>`;
  }).join('');

  document.getElementById('monthly-tfoot').innerHTML = `<tr>
    <td class="px-4 py-2.5">Total / Prom.</td>
    <td class="px-4 py-2.5 text-right tabular-nums">${num(totOrd)}</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right tabular-nums text-gray-400">${num(activeClient.cuentasVendedor) || '—'}</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right tabular-nums">${clpM(totSin)}</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right tabular-nums">${clpM(totOrd > 0 ? totSin/totOrd : 0)}</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right">—</td>
  </tr>`;
}

// ── Tabs métricas ─────────────────────────────────────────
function setupTabs() {
  document.querySelectorAll('.metric-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.metric-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeMetric = tab.dataset.metric;
      if (activeClient) renderChart();
    });
  });
}
</script>
</body>
</html>
